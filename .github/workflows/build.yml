name: Build LDweixin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Build
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          echo "COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo none)" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
          go build -tags "no_web" -ldflags "-s -w -X main.version=$VERSION -X main.commit=$COMMIT -X main.buildTime=$BUILD_TIME" -o LDweixin.exe ./cmd/cc-connect/

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: LDweixin
          path: LDweixin.exe

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: LDweixin.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
