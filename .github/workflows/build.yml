name: Build LDweixin

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Build
        run: go build -tags "no_web" -o LDweixin.exe ./cmd/cc-connect/

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: LDweixin.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
